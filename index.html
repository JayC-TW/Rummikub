<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>拉密 Rummikub</title>
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <!-- ===== 開始畫面 ===== -->
  <section id="start-screen" class="screen">
    <div class="start-card">
      <h1>拉密 Rummikub</h1>
      <p class="subtitle">選擇單人或多人連線對戰</p>

      <div class="game-mode-grid">
      <section class="game-mode-panel">
      <h2>單人對戰</h2>

      <div class="field">
        <label>電腦對手人數</label>
        <div class="segmented" id="ai-count-group">
          <button type="button" class="seg-btn" data-value="1">1 位</button>
          <button type="button" class="seg-btn" data-value="2">2 位</button>
          <button type="button" class="seg-btn" data-value="3">3 位</button>
        </div>
      </div>

      <div class="field" id="ai-levels-field">
        <label>電腦對手難度</label>
        <div id="ai-levels-list"></div>
      </div>

      <div class="field">
        <label>回合限時</label>
        <div class="segmented" id="turn-time-group">
          <button type="button" class="seg-btn" data-value="30">30 秒</button>
          <button type="button" class="seg-btn" data-value="60">60 秒</button>
          <button type="button" class="seg-btn" data-value="120">120 秒</button>
          <button type="button" class="seg-btn" data-value="Infinity">無限制</button>
        </div>
      </div>

      <button id="btn-start-game" class="primary-btn">開始遊戲</button>

      </section>

      <section class="game-mode-panel">
      <h2>多人對戰</h2>
      <div id="multiplayer-form">
        <div class="field compact-field">
          <label for="player-name">玩家暱稱</label>
          <input id="player-name" maxlength="12" autocomplete="nickname" placeholder="請輸入暱稱" />
        </div>
        <div class="field compact-field">
          <label>最多玩家人數</label>
          <div class="segmented" id="multiplayer-count-group">
            <button type="button" class="seg-btn" data-value="2">2 位</button>
            <button type="button" class="seg-btn active" data-value="3">3 位</button>
            <button type="button" class="seg-btn" data-value="4">4 位</button>
          </div>
        </div>
        <div class="field compact-field">
          <label>缺額電腦難度</label>
          <div id="multiplayer-ai-levels"></div>
        </div>
        <div class="field compact-field">
          <label>回合限時</label>
          <div class="segmented" id="multiplayer-turn-time-group">
            <button type="button" class="seg-btn" data-value="30">30 秒</button>
            <button type="button" class="seg-btn active" data-value="60">60 秒</button>
            <button type="button" class="seg-btn" data-value="120">120 秒</button>
            <button type="button" class="seg-btn" data-value="Infinity">無限制</button>
          </div>
        </div>
        <div class="multiplayer-actions">
          <button id="btn-create-room" class="secondary-btn" type="button">建立房間</button>
          <div class="join-row">
            <input id="room-code" maxlength="4" autocomplete="off" placeholder="房號" />
            <button id="btn-join-room" class="secondary-btn" type="button">加入</button>
          </div>
        </div>
        <p id="multiplayer-status" class="connection-status">尚未連線</p>
      </div>

      <div id="room-lobby" hidden>
        <div class="room-heading">房間 <strong id="current-room-code"></strong></div>
        <div id="room-player-list"></div>
        <p class="lobby-hint">房間同步已完成；多人牌局將於下一階段開放。</p>
        <button id="btn-start-multiplayer" class="primary-btn" type="button">開始遊戲</button>
        <button id="btn-leave-room" class="secondary-btn" type="button">離開房間</button>
      </div>

      </section>
      </div>

      <p class="stats-line" id="stats-line"></p>
    </div>
  </section>

  <!-- ===== 遊戲畫面 ===== -->
  <section id="game-screen" class="screen" hidden>
    <div id="opponents-bar"></div>

    <div id="board-wrap">
      <div id="board-area"></div>
    </div>

    <div id="controls-bar">
      <button id="btn-restart" class="ctl-btn">重新開始</button>
      <div id="timer-display">--</div>
      <div id="action-buttons">
        <button id="btn-music" class="ctl-btn" title="背景音樂開關">🎵</button>
        <button id="btn-sort" class="ctl-btn">重新排列</button>
        <button id="btn-undo" class="ctl-btn">還原本回合出牌</button>
        <button id="btn-draw" class="ctl-btn">抽牌</button>
        <button id="btn-end" class="ctl-btn primary">結束回合</button>
      </div>
    </div>

    <div id="hand-wrap">
      <div id="hand-area"></div>
    </div>
  </section>

  <!-- ===== 結束畫面 ===== -->
  <section id="end-screen" class="screen" hidden>
    <div class="start-card">
      <h1 id="end-title">遊戲結束</h1>
      <div id="end-scores"></div>
      <button id="btn-play-again" class="primary-btn">再玩一局</button>
    </div>
  </section>

  <div id="toast"></div>
  <div id="action-dialog" class="action-dialog" hidden role="dialog" aria-modal="true" aria-labelledby="action-dialog-title">
    <div class="action-dialog-card">
      <h2 id="action-dialog-title">確認操作</h2>
      <p id="action-dialog-message"></p>
      <div class="action-dialog-buttons">
        <button id="btn-dialog-cancel" class="secondary-btn" type="button">取消</button>
        <button id="btn-dialog-confirm" class="primary-btn" type="button">確認</button>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/ui.js"></script>
</body>
</html>
